name: apothecary-inventory

services:
  db:
    container_name: apothecary-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - apothecary-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: apothecary-api
    build: ../api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      SEED_MODE: ${SEED_MODE:-none}
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: apothecary-web
    build:
      context: ../web
      args:
        API_PROXY_URL: http://api:4000
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  apothecary-db-data:
